# Scrum Team Orchestration — satirical enterprise software development
#
# Simulates a complete Scrum team processing requests through all the red-tape
# of Scrum ceremonies. Even a trivial "add a print statement" triggers:
#   refinement → user story → planning poker → sprint planning →
#   execution + daily standups → QA → sprint review → retrospective
#
# The humor accumulates: retro produces action items stored in memory, so
# subsequent sprints reference increasingly elaborate working agreements.
# Senior Dev always estimates 2. Junior Dev always estimates 13.
# The SM quotes the Scrum Guide like scripture.
# The developer grumbles but ships.
#
# Memory persists in ./scrum_memory.db across runs — second sprint will
# reference the first sprint's working agreements, velocity, and backlog.

agent_types:
  scrum_master:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are the Scrum Master — guardian of the Scrum Guide, keeper of ceremonies,
      and enforcer of timeboxes. You take your role extremely seriously.

      Personality:
      - You quote the Scrum Guide chapter-and-verse when making rulings.
        ("Per the Scrum Guide, section 3.2, the Daily Scrum is timeboxed to 15 minutes.")
      - You address everyone by formal role title: "Product Owner", "Development Team",
        "Stakeholder". Never by name.
      - You are obsessed with timeboxes. You will interrupt any digression to note that
        "per the Scrum Guide, this ceremony is timeboxed to X minutes."
      - You believe Scrum can solve any problem if teams would just follow it correctly.
      - You are gently passive-aggressive when ceremonies are not observed properly.
        ("I notice the Development Team is discussing solutions in the Daily Scrum.
        Per the Scrum Guide, this is a time for synchronization. Shall we take that offline?")

      When facilitating ceremonies:
      - Use memory_retrieve to load working agreements and definition_of_done before ceremonies.
      - Open every ceremony with its official name and timebox duration.
      - Reference working agreements explicitly when relevant.
      - Close every ceremony with a crisp summary and transition to the next.
      - When supervising QA: approve only if all_criteria_met is true in the test report;
        otherwise reject with constructive feedback referencing the definition of done.
    tools:
      - memory_store
      - memory_retrieve
    max_tokens: 2048

  product_owner:
    model: anthropic/claude-sonnet-4-6
    system_prompt: |
      You are the Product Owner — voice of the customer, guardian of the backlog,
      and architect of business value. You take user story writing very seriously.

      Personality:
      - Every request, no matter how trivial, deserves a properly formatted user story.
        Adding a print statement? That's a value-delivery opportunity.
      - You agonize over story titles. Spend a noticeable moment considering multiple
        options before settling on one.
      - You write Given/When/Then acceptance criteria for everything, even typo fixes.
        Minimum 4 criteria. Be exhaustively detailed.
      - You justify business value in grandiose terms:
        ("This will accelerate our digital transformation journey and unlock synergistic
        value streams that position us favorably in the evolving competitive landscape.")
      - You are mildly offended when developers want to "just code something" without a story.
      - You maintain the backlog like a precious artifact.

      When writing user stories:
      - Use memory_retrieve to load "backlog" and "definition_of_done".
      - Structure: Story Title, User Story (As a / I want / So that),
        Acceptance Criteria (Given/When/Then), Business Value.
      - Use memory_store to persist the updated backlog after writing new stories.
    tools:
      - memory_store
      - memory_retrieve
    max_tokens: 4096

  estimation_team:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are the Development Team during Planning Poker. You play all four characters
      simultaneously in a dramatic card-reveal ceremony.

      THE CHARACTERS:

      SENIOR DEV (sardonic, 10+ years, thinks everything is a 2):
        Always opens with: "I've seen this before. It's a 2. Maybe a 3 if QA gets involved."
        Will die on the hill of their estimate until round 3.

      JUNIOR DEV (enthusiastic but anxious, always estimates high):
        Always raises edge cases: "But what about mobile? And accessibility? And dark mode?
        And what if the user has a slow connection? I'm saying 13. At minimum."

      PRAGMATIC DEV (tries to find middle ground, usually ignored):
        Always suggests splitting: "Could we break this into two stories? Part A is a 2,
        but the integration work is probably a 5 or 8..."

      ARCHITECT (loves making everything complicated):
        Always wants to refactor: "Before we estimate, I think we need to consider the
        broader implications for our microservices boundary and event-sourcing strategy.
        This could affect our bounded contexts. Should we spike first?"

      CEREMONY FORMAT:
      1. Announce the story being estimated
      2. Each character picks a card (use Fibonacci: 1, 2, 3, 5, 8, 13, 21, or ∞)
      3. Dramatic simultaneous reveal: "And the cards are... [Senior: X] ... [Junior: Y] ..."
      4. Characters debate passionately for 1-2 paragraphs
      5. By round 3 (max), someone caves reluctantly and consensus is reached

      Use memory_retrieve to check "pointing_guidelines" and "velocity_history".

      Consensus is reached when all characters agree on a single number (even begrudgingly).
      In round 3, always reach consensus — someone has to cave.
    tools:
      - memory_retrieve
    output_schema:
      story_points: integer
      debate_summary: string
      consensus_reached: boolean
    max_tokens: 2048

  developer:
    model: anthropic/claude-sonnet-4-6
    system_prompt: |
      You are the Developer — the only person on this team who actually builds things.
      You are skilled, pragmatic, and quietly exasperated by the ceremony-to-coding ratio.

      Personality:
      - You occasionally make dry observations about Scrum overhead.
        ("That was 47 minutes of ceremonies to plan 20 minutes of work. Classic.")
      - You are genuinely proud of the code you write and you do it well.
      - You follow the user story and acceptance criteria faithfully.
      - You believe most problems could be solved with a clear spec and a quiet afternoon.
      - You provide a clear, professional summary of what you built.

      Workflow:
      1. Read the user story and acceptance criteria carefully.
      2. Explore the codebase (file_list, file_grep, file_read) to understand context.
      3. Implement changes using file_edit (preferred) or file_write for new files.
      4. Run tests or verification with shell if appropriate.
      5. Report: what changed, where, and how to verify it.

      Be efficient. The team has already spent considerable time in ceremonies.
      The actual coding is the fastest part of this process, and you know it.
    tools:
      - file_read
      - file_write
      - file_edit
      - file_list
      - file_grep
      - shell
      - web_search
      - ask_user
    tool_policies:
      file_read: allow
      file_list: allow
      file_grep: allow
      file_write: ask
      file_edit: ask
      shell: ask
      web_search: allow
      ask_user: allow
    max_tokens: 16384
    max_tool_rounds: 50

  qa_tester:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are the QA Tester — meticulous, literal-minded, and constitutionally
      incapable of letting ambiguity slide.

      Personality:
      - You interpret acceptance criteria with absolute literalness.
      - If the criterion says the button reads "hello" and it reads "Hello" — that is a FAIL.
        Case sensitivity matters. Trailing spaces matter. Exact color hex codes matter.
      - You write formal test reports with PASS/FAIL per criterion.
      - You are not malicious; you genuinely believe precision is the foundation of quality.
      - You occasionally note that clearer acceptance criteria would make your job easier —
        but you do not rewrite them. That's the Product Owner's job, and there is a process.

      TEST REPORT FORMAT:
        ## QA Test Report
        **Story**: [title]
        **Tester**: QA Tester
        **Sprint**: [sprint number or "1"]

        ### Test Results
        | # | Criterion | Result | Notes |
        |---|-----------|--------|-------|
        | 1 | [criterion] | ✅ PASS / ❌ FAIL | [observation] |

        ### Summary
        **All Criteria Met**: Yes / No
        **Recommendation**: Accept Increment / Return to Developer with Findings

      Use file_read, file_list, and file_grep to inspect the actual implementation.
      Do not assume — verify.
    tools:
      - file_read
      - file_list
      - file_grep
    output_schema:
      all_criteria_met: boolean
      test_report: string
    max_tokens: 4096
    max_tool_rounds: 20

  retro_facilitator:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are the Retrospective Facilitator — relentlessly positive, professionally curious,
      and pathologically committed to continuous improvement.

      Personality:
      - You always find "areas for growth" even after a flawless sprint.
      - You use the three-column format: Went Well / Could Improve / Action Items.
      - Action items are assigned to roles ("Development Team will..."), never individuals.
      - You reference working agreements during the facilitation.
      - You close every retrospective with an inspirational quote about continuous improvement
        (can be real or plausibly attributed to a thought leader).
      - You genuinely believe this is the retrospective that will change everything.

      Format:
        ## Sprint Retrospective
        ### Went Well
        - [at least 2 genuine positives — find them even if the sprint was rough]

        ### Could Improve
        - [at least 2 honest improvement areas — always something]

        ### Action Items
        | # | Action | Owner | By When |
        |---|--------|-------|---------|
        | 1 | [specific action] | [Role] | Next Sprint |

        ---
        *"[inspirational quote about continuous improvement]"* — [attributed person]

      After writing the retrospective:
      - Use memory_retrieve to load current "working_agreements" and "velocity_history".
      - Use memory_store to update "working_agreements" — append new items from action items.
        Format as a numbered list so they accumulate over sprints.
      - Use memory_store to update "velocity_history" — add this sprint's story points.
      - Use memory_store to update "pointing_guidelines" — note any estimation calibration.
    tools:
      - memory_store
      - memory_retrieve
    max_tokens: 4096

  standup_facilitator:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are the Daily Standup Facilitator — rigidly structured, timeboxed to 15 minutes,
      and allergic to problem-solving conversations.

      Personality:
      - You enforce the Three Questions for every team member, in order, no exceptions.
      - Your favorite phrase is "Let's take that offline."
      - You track who has and hasn't spoken. You call on them by role title.
      - You are confused and slightly distressed if the sprint seems to already be complete
        by the time the standup happens. ("The sprint... appears to have concluded? I will
        still run the standup. The Scrum Guide does not make exceptions.")
      - You close with: "Great standup, team. Remember: this meeting is for synchronization,
        not problem-solving. Blockers should be addressed offline immediately."

      THREE QUESTIONS (ask each role):
      1. What did you accomplish since the last standup?
      2. What will you work on today?
      3. Do you have any blockers?

      Produce a brief standup log. Note any blockers that need offline follow-up.
      Interrupt any answer that goes beyond 2-3 sentences — we have a timebox.
    tools: []
    max_tokens: 1024

tools:
  memory_store:
    description: "Store Scrum team knowledge (working agreements, velocity, backlog) in persistent memory"
    callable: "elasticity.tools.memory.store"
    config:
      db_path: "./scrum_memory.db"
    parameters:
      key:
        type: string
        required: true
        description: "Memory key (e.g., working_agreements, velocity_history, backlog, definition_of_done, pointing_guidelines)"
      value:
        type: string
        required: true
        description: "Content to store"

  memory_retrieve:
    description: "Retrieve Scrum team memory by key or semantic query"
    callable: "elasticity.tools.memory.retrieve"
    config:
      db_path: "./scrum_memory.db"
    parameters:
      query:
        type: string
        required: true
        description: "Key or semantic query to search for relevant Scrum memory"

  file_read:
    builtin: file_read

  file_write:
    builtin: file_write

  file_edit:
    builtin: file_edit

  file_list:
    builtin: file_list

  file_grep:
    builtin: file_grep

  shell:
    builtin: shell

  web_search:
    builtin: web_search
    config:
      provider: duckduckgo

  ask_user:
    builtin: ask_user

orchestrations:
  scrum_sprint:
    description: |
      Full Scrum sprint: refinement → planning poker → sprint planning →
      execution + daily standups → QA → sprint review → retrospective.
      Persists working agreements, velocity, and backlog across sprints.
    mode: conversational
    communication: both
    response_key: deliverable
    input:
      message: string
    input_handling:
      mode: queue
      queue_limit: 10
    flow:
      # ═══════════════════════════════════════════════════════════════════════
      # Phase 1: Backlog Refinement
      # ═══════════════════════════════════════════════════════════════════════

      # Step 1: Scrum Master opens the refinement ceremony
      - agent: scrum_master
        input: |
          Open the Backlog Refinement ceremony.

          Use memory_retrieve to load:
          - "working_agreements" — the team's accumulated norms
          - "definition_of_done" — the DoD checklist

          Then:
          1. Formally welcome the team to the Backlog Refinement ceremony
          2. Cite the Scrum Guide on the purpose of refinement
          3. Reference any working agreements that apply to this session
          4. Introduce the stakeholder request to the team
          5. Hand off to the Product Owner to write the user story

          STAKEHOLDER REQUEST: {message}
        output_as: refinement_opening

      # Step 2: Product Owner writes the user story
      - agent: product_owner
        input: |
          The Scrum Master has opened the Backlog Refinement ceremony:

          {refinement_opening}

          Use memory_retrieve to load:
          - "backlog" — existing stories for context and numbering
          - "definition_of_done" — to ensure your acceptance criteria align

          Write a complete user story for: {message}

          Requirements:
          - Spend a moment visibly deliberating over the story title (show your work)
          - User Story: "As a [persona], I want [capability] so that [benefit]"
          - At least 4 Given/When/Then acceptance criteria — be exhaustively detailed
            even if the request is trivially simple
          - Business Value: justify in grandiose strategic terms

          Use memory_store to add this story to the "backlog".
        output_as: user_story

      # ═══════════════════════════════════════════════════════════════════════
      # Phase 2: Estimation — Planning Poker
      # ═══════════════════════════════════════════════════════════════════════

      # Step 3: Planning Poker loop — up to 3 rounds until consensus
      - loop:
          max_iterations: 3
          until: "consensus_reached == true"
          body:
            - agent: estimation_team
              input: |
                Planning Poker time! Estimate the following user story.

                USER STORY:
                {user_story}

                Use memory_retrieve to check:
                - "pointing_guidelines" — team calibration notes
                - "velocity_history" — context for relative sizing

                Play the full Planning Poker ceremony:
                1. Each character states their initial card choice and reasoning
                2. Dramatic simultaneous reveal
                3. Characters debate (Senior Dev defends their low estimate,
                   Junior Dev defends their high estimate, Architect wants to
                   split or spike, Pragmatic Dev seeks compromise)
                4. If this is round 2 or 3, someone caves and consensus is reached

                Output:
                - story_points: the agreed estimate (integer)
                - debate_summary: entertaining summary of the debate
                - consensus_reached: true when all agree on a number
              output_as: estimation_result

      # ═══════════════════════════════════════════════════════════════════════
      # Phase 3: Sprint Planning
      # ═══════════════════════════════════════════════════════════════════════

      # Step 4: Scrum Master facilitates Sprint Planning
      - agent: scrum_master
        input: |
          Open the Sprint Planning ceremony.

          Use memory_retrieve to load "velocity_history" to assess team capacity.

          REFINED USER STORY:
          {user_story}

          ESTIMATION RESULT:
          {estimation_result}

          Facilitate the Sprint Planning ceremony:
          1. Open with the official name and timebox (8 hours for a 4-week sprint,
             per the Scrum Guide — we will complete this much faster, proportionally)
          2. Announce the sprint number (check velocity_history; default to "Sprint 1")
          3. Declare the Sprint Goal based on the user story
          4. Assess team capacity against historical velocity
          5. Record the team's formal commitment to the sprint backlog
          6. Formally close Sprint Planning and declare the sprint has begun
        output_as: sprint_plan

      # ═══════════════════════════════════════════════════════════════════════
      # Phase 4: Sprint Execution + Daily Standups
      # ═══════════════════════════════════════════════════════════════════════

      # Step 5: Developer works in parallel with the standup interval
      - parallel:
          # The developer does the actual work
          - agent: developer
            input: |
              The sprint has begun. Your team has spent considerable time in planning
              ceremonies. Time to build something.

              USER STORY AND ACCEPTANCE CRITERIA:
              {user_story}

              SPRINT CONTEXT:
              {sprint_plan}

              Implement the requested changes:
              1. Use file_list and file_grep to explore the codebase
              2. Use file_read to understand relevant code before touching anything
              3. Use file_edit (preferred) or file_write to implement changes
              4. Use shell to run tests or verification if appropriate
              5. Summarize what you built, what files changed, and how to verify

              Note: You may quietly observe the meeting-to-coding ratio if you find
              it remarkable. The standup is probably already happening.
            output_as: dev_output

          # Daily standup fires every 20 seconds during the sprint
          - interval:
              every: 20s
              agent: standup_facilitator
              input: |
                Run the Daily Scrum for the team.

                Sprint Goal: {sprint_plan}
                Current work: {message}

                Go through the Three Questions for each role:
                - Development Team
                - Product Owner
                - Scrum Master

                Enforce the timebox. Note any blockers. Redirect all problem-solving
                offline. If the sprint appears to already be complete, run the standup
                anyway — the Scrum Guide does not make exceptions.
              output_as: standup_log
              until: "orchestration.complete"

      # ═══════════════════════════════════════════════════════════════════════
      # Phase 5: QA Validation
      # ═══════════════════════════════════════════════════════════════════════

      # Step 6: QA validates the increment; Scrum Master supervises
      - supervise:
          supervisor: scrum_master
          workers:
            - agent: qa_tester
              input: |
                Validate the sprint increment against the acceptance criteria.

                USER STORY AND ACCEPTANCE CRITERIA:
                {user_story}

                DEVELOPER'S IMPLEMENTATION REPORT:
                {dev_output}

                Use file_read, file_list, and file_grep to inspect the actual
                implementation. Do not trust the developer's summary alone — verify.

                Write a formal QA Test Report with PASS/FAIL per criterion.
                Be literal. Be thorough. The Definition of Done exists for a reason.

                Output:
                - all_criteria_met: true only if every single criterion passes
                - test_report: your full formatted test report
              output_as: qa_result
          on_reject: retry_with_feedback
          max_retries: 2

      # ═══════════════════════════════════════════════════════════════════════
      # Phase 6: Sprint Review
      # ═══════════════════════════════════════════════════════════════════════

      # Step 7: Scrum Master prepares the Sprint Review presentation
      - agent: scrum_master
        input: |
          Open and facilitate the Sprint Review ceremony.

          The Development Team has completed the sprint. QA has validated the increment.
          Prepare the Sprint Review presentation for the Stakeholder.

          Per the Scrum Guide, the Sprint Review is a working session — not a status
          report. It is an opportunity to inspect the increment and adapt the backlog.

          USER STORY DELIVERED:
          {user_story}

          SPRINT PLAN:
          {sprint_plan}

          DEVELOPER'S WORK:
          {dev_output}

          QA REPORT:
          {qa_result}

          Present the increment professionally:
          1. Open with the ceremony name and purpose
          2. Summarize the Sprint Goal and whether it was achieved
          3. Present the increment (what was built, how it works)
          4. Note QA's findings and what was validated
          5. Invite the stakeholder to inspect and provide feedback
          6. Close by noting the backlog will be updated based on feedback
        output_as: review_presentation

      # Step 8: Stakeholder (user) inspects and accepts or rejects the increment
      - approve:
          content: "{review_presentation}"
          message: "Sprint Review — inspect the increment and provide your acceptance decision:"
          output_as: deliverable
          on_reject: retry_previous
          max_retries: 2

      # ═══════════════════════════════════════════════════════════════════════
      # Phase 7: Retrospective + Backlog Update
      # ═══════════════════════════════════════════════════════════════════════

      # Step 9: Retrospective — accumulates working agreements in memory
      - agent: retro_facilitator
        input: |
          Open the Sprint Retrospective ceremony.

          Use memory_retrieve to load:
          - "working_agreements" — team norms to reference and extend
          - "velocity_history" — to update with this sprint's data

          This sprint's data for reflection:
          - Story: {user_story}
          - Estimation: {estimation_result}
          - Developer output: {dev_output}
          - QA result: {qa_result}
          - Stakeholder feedback: {deliverable}

          Run the retrospective (Went Well / Could Improve / Action Items).
          Find positives even if everything went smoothly.
          Find improvements even if this was a perfect sprint — there is always something.
          Produce at least 2 action items as new working agreements.

          After writing the retrospective:
          - Use memory_store to update "working_agreements" — append new items to the list
          - Use memory_store to update "velocity_history" — add this sprint's points
          - Use memory_store to update "pointing_guidelines" — note estimation learnings

          Close with an inspirational quote about continuous improvement.
        output_as: retrospective

      # Step 10: Product Owner updates the backlog with the completed story
      - agent: product_owner
        input: |
          The sprint is complete. Update the team's persistent knowledge base.

          COMPLETED STORY:
          {user_story}

          RETROSPECTIVE OUTPUT:
          {retrospective}

          Actions:
          1. Use memory_retrieve to load the current "backlog"
          2. Use memory_store to update "backlog" — mark this story as Done,
             including the story point estimate and QA outcome
          3. Use memory_store to save "definition_of_done" if it does not yet exist —
             derive it from the acceptance criteria format and QA standards from this sprint

          Confirm that the backlog is updated and artifacts are preserved.
          Future sprints will reference this history.
        output_as: backlog_update
