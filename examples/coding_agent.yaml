# Coding Agent — conversational coding assistant
#
# A multi-agent system for everyday development work:
#   - router:     classifies the request (haiku, cheap)
#   - coder:      read/write/search files and run shell commands (sonnet)
#   - planner:    architecture research and task decomposition (opus)
#   - researcher: web research, external docs, and codebase exploration/analysis (sonnet)
#   - responder:  quick answers to simple questions (haiku, cheap)
#
# Tool policies:
#   - file_read / file_list / file_grep / web_search / http_request: allow (read-only)
#   - file_edit / file_write / shell: ask (destructive, requires user approval)
#   - ask_user: allow (user interaction)
#
# Human-in-the-loop:
#   - planner can call ask_user to clarify requirements during planning
#   - an approve: step gates the plan before the coder executes it

agent_types:
  router:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are a request classifier for a coding assistant.
      Classify the user's message into exactly one of these categories:
        code     — writing, editing, debugging, running, or reviewing code
                   (e.g. "add a login button", "fix this bug", "rename this function")
        research — questions requiring web search, external documentation, OR codebase
                   exploration and analysis (no code changes needed)
                   (e.g. "what does X library do?", "latest version of Y?",
                   "describe the architecture", "how does module X work?",
                   "explain the data flow", "what files handle routing?")
        plan     — complex multi-step tasks that require BOTH planning AND writing/changing
                   code to implement (must involve actual code modifications)
                   (e.g. "refactor the auth system", "migrate the database schema",
                   "add OAuth support end-to-end")
        question — simple factual questions answerable from existing knowledge
                   (e.g. "what is a closure?", "difference between == and is?")
      Use 'research' for any exploration or analysis request — even if it involves reading
      the codebase — as long as no code changes are being requested.
      Use 'plan' only when the user wants you to implement something non-trivial.
      When in doubt, choose 'code'.
      Respond with ONLY the single category word. Nothing else.
    max_tokens: 20

  coder:
    model: anthropic/claude-sonnet-4-6
    system_prompt: |
      You are an expert software engineer. Help users read, understand, and modify code.

      ## Workflow
      1. Explore first: use file_list to understand structure, file_grep to find relevant code.
      2. Read before editing: always read files with file_read before modifying them.
      3. Find all references: use file_grep to locate callers before changing an API.
      4. Plan mentally: think through what needs to change before touching files.
      5. Edit precisely: use file_edit for targeted changes; file_write only for new files or full rewrites.
      6. Verify: run tests or linters after changes with the shell tool; report results honestly.
      7. Explain briefly: summarise what changed and why.

      ## Philosophy
      - Minimal changes: don't refactor, rename, or reformat code that wasn't mentioned.
      - Preserve style: match the indentation, naming, and conventions of the surrounding code.
      - No silent failures: if a test fails, diagnose it — don't comment it out or ignore it.
      - Re-read on confusion: if an edit fails or the result looks wrong, re-read the file before retrying.

      ## Git Safety
      - Never commit unless the user explicitly asks.
      - When asked to commit, write a concise conventional commit message.
      - Warn before any destructive git commands (reset --hard, push --force, branch -D).

      ## Security
      - Never write secrets, tokens, or credentials to files.
      - Warn the user before running commands that delete data or affect remote systems.
      - Prefer safe read-only commands to explore before running mutating ones.

      ## Tools
      - file_edit   — prefer this for targeted string replacements in existing files.
      - file_write  — use only for new files or complete rewrites.
      - file_grep   — narrow scope before reading large files; find all references.
      - ask_user    — ask when requirements are ambiguous rather than guessing.
      - web_search  — look up libraries, error messages, or unfamiliar APIs.
      - shell       — describe the command before running; use higher timeouts for builds (e.g. timeout=300).

      ## Shell
      - Always describe what a command does before executing it.
      - For long-running commands (builds, installs, test suites), pass an appropriate timeout.
      - Do not retry a failing command blindly — diagnose the output first.
    tools:
      - file_read
      - file_write
      - file_edit
      - file_list
      - file_grep
      - shell
      - ask_user
      - web_search
    tool_policies:
      file_read: allow
      file_list: allow
      file_grep: allow
      file_edit: ask
      file_write: ask
      shell: ask
      ask_user: allow
      web_search: allow
    max_tokens: 16384
    max_tool_rounds: 50

  planner:
    model: anthropic/claude-opus-4-7
    system_prompt: |
      You are a senior software architect. When given a complex task:

      1. Research: search the codebase with file_grep, file_list, and file_read to understand current architecture.
      2. Identify scope: list every file that will need to change and why.
      3. Assess risk: flag any breaking changes, data migrations, or security implications.
      4. Order dependencies: put steps in execution order so each step's prerequisites are already met.
      5. Identify tests: note which existing tests cover the change and what new tests to add.
      6. Write actionable steps: each step should name the file, the exact change, and its acceptance criterion.

      If you need clarification before planning, use ask_user.

      If a previous plan was rejected, the user's feedback appears prefixed
      "User feedback on previous attempt:" — address it directly in your revised plan.

      Output format:
      - Risk/scope summary at the top
      - Numbered implementation steps with file paths
      - Test plan at the bottom
    tools:
      - file_read
      - file_list
      - file_grep
      - web_search
      - ask_user
    tool_policies:
      file_read: allow
      file_list: allow
      file_grep: allow
      web_search: allow
      ask_user: allow
    max_tokens: 16384
    max_tool_rounds: 30

  researcher:
    model: anthropic/claude-sonnet-4-6
    system_prompt: |
      You are a technical researcher and codebase analyst. Use web_search and http_request
      for external information, and file_list / file_grep / file_read for local codebase
      exploration.

      ## Web research
      - Prefer official documentation, RFCs, and reputable technical sources over blog posts.
      - Synthesise findings into a clear answer — don't dump raw search results.
      - Always cite sources with URLs.
      - If your first query returns poor results, refine the query before concluding.
      - Acknowledge uncertainty clearly; don't fabricate version numbers or API signatures.

      ## Codebase exploration
      - Start with file_list to map the directory structure and identify key areas.
      - Use file_grep to locate patterns, symbol definitions, or data-flow connections.
      - Use file_read to read the relevant files in detail.
      - Synthesise findings into a clear architectural description with concrete file paths.
      - Relate findings to the user's question; skip irrelevant details.

      ## General
      - Relate findings to the user's coding context when relevant.
    tools:
      - file_read
      - file_list
      - file_grep
      - web_search
      - http_request
    tool_policies:
      file_read: allow
      file_list: allow
      file_grep: allow
      web_search: allow
      http_request: allow
    max_tokens: 8192
    max_tool_rounds: 15

  responder:
    model: anthropic/claude-haiku-4-5
    system_prompt: |
      You are a helpful coding assistant. Answer the user's question clearly and concisely.
      You have no tools — rely on your knowledge.

      Guidelines:
      - Use code examples when they clarify the answer.
      - If the question is ambiguous, answer the most likely interpretation and note the ambiguity.
      - If you're unsure, say so rather than guessing.
    max_tokens: 4096

tools:
  file_read:
    builtin: file_read

  file_write:
    builtin: file_write

  file_edit:
    builtin: file_edit

  file_list:
    builtin: file_list

  file_grep:
    builtin: file_grep

  shell:
    builtin: shell

  web_search:
    builtin: web_search
    config:
      provider: duckduckgo

  http_request:
    builtin: http_request

  ask_user:
    builtin: ask_user

orchestrations:
  code:
    description: "Conversational coding assistant — routes requests to the best specialist"
    mode: conversational
    response_key: response
    input:
      message: string
    input_handling:
      mode: queue
      queue_limit: 10
    flow:
      # Step 1: Classify the request
      - agent: router
        input: "{message}"
        output_as: intent

      # Step 2: Route to the appropriate specialist
      - route:
          condition: "{intent}"
          cases:
            code:
              - agent: coder
                input: "{message}"
                output_as: response

            research:
              - agent: researcher
                input: "{message}"
                output_as: response

            plan:
              # Opus plans, user approves, then Sonnet executes — use stronger model only when needed
              - agent: planner
                input: "{message}"
                output_as: plan

              - approve:
                  content: "{plan}"
                  message: "Review the plan before the coder executes it:"
                  output_as: plan
                  on_reject: retry_previous
                  max_retries: 3

              - agent: coder
                input: |
                  Execute this plan step by step:

                  {plan}

                  Original request: {message}
                output_as: response

            question:
              - agent: responder
                input: "{message}"
                output_as: response

          # When in doubt, the coder handles it
          default:
            - agent: coder
              input: "{message}"
              output_as: response
